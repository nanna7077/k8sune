name: Package and Release

permissions:
  contents: write

on:
  push:
    tags:
      - '*'
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag/version to release (e.g. v0.0.1) - Leave empty to build only'
        required: false
        default: ''

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm ci
      - name: Install frontend dependencies
        run: npm ci --prefix frontend


      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      - name: Add macOS Rust targets
        if: matrix.os == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libfuse2 \
            patchelf \
            zsync

      - name: Build Tauri application
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            npm run tauri build -- --target universal-apple-darwin --verbose
          else
            npm run tauri build -- --verbose
          fi
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPIMAGE_EXTRACT_AND_RUN: 1

      - name: Sign and notarize DMG
        if: matrix.os == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        run: |
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg")
          codesign --sign "$APPLE_CERTIFICATE" --deep --force "$DMG"
          # Notarize (requires Apple notary credentials)
          xcrun altool --notarize-app -f "$DMG" --primary-bundle-id "com.nanna7077.k8sune" -u "$APPLE_NOTARY_USER" -p "$APPLE_NOTARY_PASSWORD"
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_NOTARY_USER: ${{ secrets.APPLE_NOTARY_USER }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}

      - name: Gather built bundles
        run: |
          mkdir -p artifacts
          if [ -d "src-tauri/target/release/bundle" ]; then
            find src-tauri/target/release/bundle -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) -exec cp {} artifacts/ \;
          fi
          if [ -d "src-tauri/target/universal-apple-darwin/release/bundle/dmg" ]; then
            find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" -exec cp {} artifacts/ \;
          fi
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            VERSION="${{ github.event.inputs.tag_name || github.event.release.tag_name || github.ref_name }}"
            tar -czf "artifacts/k8sune-${VERSION}.tar.gz" -C src-tauri/target/release k8sune
            sha256sum "artifacts/k8sune-${VERSION}.tar.gz" | awk '{print $1}' > "artifacts/k8sune-${VERSION}.tar.gz.sha256"
          fi

      - name: Upload artifacts for workflow run
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-artifacts-${{ matrix.os }}
          path: artifacts/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.tag_name != '' || startsWith(github.ref, 'refs/tags/') || github.event.release.tag_name != null
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: download-artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-artifacts
          find download-artifacts -type f -exec cp {} release-artifacts/ \;

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.event.release.tag_name || github.ref_name }}
          files: release-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    needs: publish
    runs-on: ubuntu-latest
    if: github.event.inputs.tag_name != '' || startsWith(github.ref, 'refs/tags/') || github.event.release.tag_name != null
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: download-artifacts

      - name: Checkout/Initialize Homebrew tap repository
        env:
          TAP_REPO: ${{ secrets.HOMEBREW_TAP_REPO }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${TAP_REPO}.git" tap || {
            echo "Clone failed. Initializing manually..."
            mkdir -p tap
            cd tap
            git init
            git remote add origin "https://x-access-token:${TAP_TOKEN}@github.com/${TAP_REPO}.git"
            cd ..
          }
          cd tap
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b main || git checkout main || true

      - name: Generate/Update Homebrew formula
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ github.event.inputs.tag_name || github.event.release.tag_name || github.ref_name }}
        run: |
          mkdir -p tap/Formula
          FORMULA_PATH="tap/Formula/k8sune.rb"
          MAC_SHA=$(cat download-artifacts/tauri-build-artifacts-macos-latest/k8sune-macos-${VERSION}.tar.gz.sha256 | tr -d '\r\n[:space:]')
          LINUX_SHA=$(cat download-artifacts/tauri-build-artifacts-ubuntu-latest/k8sune-linux-${VERSION}.tar.gz.sha256 | tr -d '\r\n[:space:]')
          
          cat > "$FORMULA_PATH" <<EOF2
          class K8sune < Formula
            desc "Modern and integrated desktop controller for Kubernetes"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MPL-2.0"

            on_macos do
              url "https://github.com/${REPO}/releases/download/${VERSION}/k8sune-macos-${VERSION}.tar.gz"
              sha256 "${MAC_SHA}"
            end

            on_linux do
              url "https://github.com/${REPO}/releases/download/${VERSION}/k8sune-linux-${VERSION}.tar.gz"
              sha256 "${LINUX_SHA}"
            end

            def install
              bin.install "k8sune"
            end
          end
          EOF2

      - name: Commit and push formula
        run: |
          cd tap
          git add Formula/k8sune.rb
          git commit -m "Release ${VERSION}" || echo "No changes to commit"
          git push origin main


